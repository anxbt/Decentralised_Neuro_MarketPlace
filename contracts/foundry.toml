[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false

# Fuzz testing configuration (minimum 100 runs for property tests)
fuzz = { runs = 100 }

# Filecoin FVM Calibration testnet configuration
[rpc_endpoints]
calibration = "https://api.calibration.node.glif.io/rpc/v1"

[etherscan]
calibration = { key = "${ETHERSCAN_API_KEY}", url = "https://calibration.filfox.info/api" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
